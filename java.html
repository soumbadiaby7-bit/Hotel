<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaction JS</title>
</head>
<body>

<button id="btnTest">Clique-moi</button>
<p id="message"></p>

<script>
const bouton = document.getElementById("btnTest");
const message = document.getElementById("message");

bouton.addEventListener("click", function () {
    message.innerHTML = `
        <form class="row g-3" method="post" action="Reservation.php">
            <div class="col-md-3">
                <label>Date d'arrivée</label>
                <input type="date" name="date_arrivee" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Date de départ</label>
                <input type="date" name="date_depart" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Nombre de personnes</label>
                <select name="nb_personnes" class="form-control">
                    <option value="1">1 personne</option>
                    <option value="2">2 personnes</option>
                    <option value="3">3 personnes</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Type de chambre</label>
                <select name="type_chambre" class="form-control">
                    <option value="Chambre standard">Chambre standard</option>
                    <option value="Suite de luxe">Suite de luxe</option>
                    <option value="Chambre familiale">Chambre familiale</option>
                </select>
            </div>

            <div class="col-md-12 text-center mt-3">
                <button type="submit" class="btn btn-warning">Envoyer</button>
            </div>
        </form>
    `;
});
</script>

</body>
</html>
